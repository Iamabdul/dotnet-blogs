<svg width="400" height="200" viewBox="0 0 400 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="200" fill="#f8fafc"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="400" height="200" fill="url(#grid)"/>
  
  <!-- Main icon container -->
  <rect x="150" y="60" width="100" height="80" rx="8" fill="#6366f1" fill-opacity="0.1" stroke="#6366f1" stroke-width="2"/>
  
  <!-- Document icon -->
  <path d="M170 80 L170 75 C170 73.8954 170.895 73 172 73 L185 73 L190 78 L190 115 C190 116.105 189.105 117 188 117 L172 117 C170.895 117 170 116.105 170 115 L170 80 Z" fill="#6366f1"/>
  <path d="M185 73 L185 78 L190 78" fill="#f8fafc"/>
  
  <!-- Lines representing text -->
  <rect x="175" y="85" width="10" height="2" rx="1" fill="#f8fafc"/>
  <rect x="175" y="90" width="8" height="2" rx="1" fill="#f8fafc"/>
  <rect x="175" y="95" width="12" height="2" rx="1" fill="#f8fafc"/>
  <rect x="175" y="100" width="6" height="2" rx="1" fill="#f8fafc"/>
  <rect x="175" y="105" width="9" height="2" rx="1" fill="#f8fafc"/>
  
  <!-- .NET logo elements -->
  <circle cx="210" cy="91" r="12" fill="#512bd4"/>
  <text x="210" y="95" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8" font-weight="bold">.NET</text>
  
  <!-- Decorative elements -->
  <circle cx="130" cy="50" r="3" fill="#a855f7" fill-opacity="0.6"/>
  <circle cx="280" cy="40" r="2" fill="#06b6d4" fill-opacity="0.6"/>
  <circle cx="320" cy="160" r="4" fill="#10b981" fill-opacity="0.6"/>
  <circle cx="80" cy="170" r="2" fill="#f59e0b" fill-opacity="0.6"/>
  
  <!-- Title text -->
  <text x="200" y="165" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="14" font-weight="500">.NET Blog</text>
</svg>